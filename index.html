<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>steve ruppel</title>
  <meta name="description" content="Handcrafted Custom Framing & Professional Art Installation — steve ruppel / sjruppel@gmail.com" />

  <link rel="icon" type="image/png" sizes="32x32" href="assets/faviconS.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/faviconS.png" />
  <link rel="apple-touch-icon" href="assets/faviconS.png" />

  <meta property="og:site_name" content="Steve Ruppel" />
  <meta property="og:title" content="steve ruppel" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sjruppel.com" />
  <meta property="og:description" content="Handcrafted Custom Framing & Professional Art Installation — steve ruppel / sjruppel@gmail.com" />
  <meta property="og:image" content="assets/goldenstateofmind.png" />

  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=cormorant-garamond:400,500,600" />

  <style>
    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevents unwanted scrolling on a full-screen landing page */
      background: #fff;
    }

    /* Full screen background image */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh; /* Uses safe viewport height for mobile browsers */
      object-fit: cover; /* Forces image to cover screen without distorting aspect ratio */
      z-index: 1;
    }

    /* Content Overlay Container */
    .content-overlay {
      position: relative;
      z-index: 2; /* Sits on top of the image */
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Pushes text to the bottom. Change to 'center' if preferred */
      align-items: center;
      text-align: center;
      padding: max(4vh, env(safe-area-inset-bottom)) 20px;
    }

    .description {
      max-width: 42rem;
      /* Background blur/tint makes text highly readable over any image background */
      background: rgba(255, 255, 255, 0.85); 
      padding: 20px 30px;
      border-radius: 4px;
      backdrop-filter: blur(5px); 
    }

    .description p {
      font-size: clamp(16px, 3vw, 20px);
      line-height: 1.4;
      letter-spacing: 0.02em;
      margin: 0;
      color: #262626;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .description .contact {
      margin-top: 0.75em;
    }

    .description a {
      color: #262626;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
    }

    .description a:hover { 
      text-decoration: underline; 
    }

    footer {
      margin-top: 15px;
      font-size: clamp(11px, 2vw, 13px);
      color: #555;
    }

    /* Smooth Fade-in effect on load */
    .bg-image, .content-overlay {
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    body.loaded .bg-image,
    body.loaded .content-overlay {
      opacity: 1;
    }

    .no-js .bg-image, .no-js .content-overlay { 
      opacity: 1; 
    }
  </style>
</head>
<body>

  <img class="bg-image" src="assets/goldenstateofmind.png" alt="golden state of mind" />

  <div class="content-overlay">
    <main class="description">
      <p class="tagline">Handcrafted Custom Framing &amp; Professional Art Installation</p>
      <p class="contact">steve ruppel / <a href="mailto:sjruppel@gmail.com">sjruppel@gmail.com</a></p>
      
      <footer>
        &copy; sjruppel.com <span id="year"></span>
      </footer>
    </main>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function reveal() {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          document.body.classList.add("loaded");
        });
      });
    }
    if (document.readyState === "complete") {
      reveal();
    } else {
      window.addEventListener("load", reveal);
    }
    setTimeout(function () { document.body.classList.add("loaded"); }, 3000);
  </script>
</body>
</html>
