<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8"/>
    <link rel="icon" href="assets/faviconS.png" sizes="32x32"/>
    <title>steve ruppel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Clean Serif Font -->
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=playfair-display:400">

    <style type="text/css">
        /* The "Force Reset" - This stops WordPress/Plugins from breaking your layout */
        html, body, div, img, a {
            margin: 0 !important;
            padding: 0 !important;
            border: 0 !important;
            box-shadow: none !important;
            transform: none !important;
            animation: none !important;
        }

        html, body {
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            font-family: 'Playfair Display', Georgia, serif !important;
            color: #262626 !important;
            -webkit-font-smoothing: antialiased !important;
        }

        /* Enforce a strict vertical, centered stack */
        .custom-wrapper {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 100vh !important;
            box-sizing: border-box !important;
            padding: 40px 20px !important;
            text-align: center !important;
            background: #ffffff !important;
            position: relative !important;
            z-index: 999999 !important; /* Forces this layout to sit on top of everything else */
        }

        /* Constrain the logo exactly like the original screenshot */
        .custom-logo {
            max-width: 680px !important;
            width: 100% !important;
            height: auto !important;
            display: block !important;
            margin: 0 auto 50px auto !important;
        }

        /* Subtitle Text Styling */
        .custom-text {
            font-size: 24px !important;
            line-height: 1.6 !important;
            font-weight: 400 !important;
            max-width: 800px !important;
            margin: 0 auto 40px auto !important;
            display: block !important;
        }

        /* Contact Details Styling */
        .custom-contact {
            font-size: 20px !important;
            margin: 0 auto 60px auto !important;
            display: block !important;
        }

        .custom-contact a {
            color: #262626 !important;
            text-decoration: none !important;
            display: inline-block !important;
        }

        .custom-contact a:hover {
            text-decoration: underline !important;
        }

        /* Footer Styling */
        .custom-footer {
            font-size: 14px !important;
            color: #777777 !important;
            display: block !important;
            margin-top: auto !important;
        }

        /* Hide any stray elements WordPress or the plugin tries to inject at the bottom */
        body > :not(.custom-wrapper) {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }
    </style>
</head>

<body>

    <!-- Using completely unique classes with !important tags to override WordPress -->
    <div class="custom-wrapper">
        
        <!-- Logo -->
        <img class="custom-logo" src="assets/goldenstateofmind.png" alt="golden state of mind"/>
        
        <!-- Main Description -->
        <div class="custom-text">
            Handcrafted Custom Framing &amp; Professional Art Installation
        </div>
        
        <!-- Contact Info -->
        <div class="custom-contact">
            steve ruppel &nbsp;/&nbsp; <a href="mailto:sjruppel@gmail.com">sjruppel@gmail.com</a>
        </div>
        
        <!-- Footer -->
        <div class="custom-footer">
            © sjruppel.com 2026
        </div>

    </div>

</body>
</html>
