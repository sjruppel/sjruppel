<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>steve ruppel</title>
  <meta name="description" content="Handcrafted Custom Framing & Professional Art Installation — steve ruppel / sjruppel@gmail.com" />

  <link rel="icon" type="image/png" sizes="32x32" href="assets/faviconS.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/faviconS.png" />
  <link rel="apple-touch-icon" href="assets/faviconS.png" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="Steve Ruppel" />
  <meta property="og:title" content="steve ruppel" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sjruppel.com" />
  <meta property="og:description" content="Handcrafted Custom Framing & Professional Art Installation — steve ruppel / sjruppel@gmail.com" />
  <meta property="og:image" content="assets/goldenstateofmind.png" />

  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=cormorant-garamond:400,500,600" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #ffffff;
      color: #262626;
      font-family: "Cormorant Garamond", "Cormorant", Georgia, "Times New Roman", serif;
      font-weight: 500;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh; /* svh avoids mobile browser-bar jump; vh fallback below */
      text-align: center;
      /* respect notches/safe areas on phones — tighter top/bottom so the page is shorter */
      padding:
        max(3vh, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(3vh, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }
    .logo {
      width: min(90vw, 1200px);
      height: auto;
      display: block;
      margin: 0 auto clamp(8px, 1.5vw, 18px);
    }
    .description {
      max-width: 42rem;
    }
    .description p {
      font-size: clamp(19px, 4.6vw, 27px);
      line-height: 1.45;
      letter-spacing: 0.01em;
      margin: 0;
    }
    .description a {
      color: #262626;
      text-decoration: none;
      /* comfortable tap target on touch screens */
      display: inline-block;
      padding: 1px 0;
    }
    .description a:hover { text-decoration: underline; }
    footer {
      margin-top: clamp(16px, 3vw, 26px);
      font-size: clamp(14px, 3.4vw, 17px);
      color: #262626;
    }
    /* Fallback for browsers without svh support */
    @supports not (height: 100svh) {
      body { min-height: 100vh; }
    }
    /* Phones in landscape: tighten vertical space so the logo still fits */
    @media (max-height: 500px) and (orientation: landscape) {
      body { padding-top: 12px; padding-bottom: 12px; }
      .logo { max-width: 760px; margin-bottom: 10px; }
      footer { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="assets/goldenstateofmind.png"
         alt="golden state of mind"
         width="3471" height="1947" />
  </header>

  <main class="description">
    <p>
      Handcrafted Custom Framing &amp; Professional Art Installation<br />
      &nbsp;<br />
      steve ruppel / <a href="mailto:sjruppel@gmail.com">sjruppel@gmail.com</a>
    </p>
  </main>

  <footer>
    &copy; sjruppel.com <span id="year"></span>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
