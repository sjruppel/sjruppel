<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" href="assets/faviconS.png" sizes="32x32"/>
    <title>steve ruppel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500">

    <style type="text/css">
        /* Global Reset */
        html, body, div, img, a {
            margin: 0 !important;
            padding: 0 !important;
            border: 0 !important;
            box-shadow: none !important;
            transform: none !important;
            animation: none !important;
        }

        html, body {
            width: 100% !important;
            height: 100% !important;
            background-color: #ffffff !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
            color: #262626 !important;
            -webkit-font-smoothing: antialiased !important;
            -moz-osx-font-smoothing: grayscale !important;
        }

        /* Clean centered flex stack */
        .custom-wrapper {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 100vh !important;
            box-sizing: border-box !important;
            padding: 40px 20px !important;
            text-align: center !important;
            background: #ffffff !important;
            position: relative !important;
            z-index: 999999 !important;
        }

        /* Constrain logo image sizing */
        .custom-logo {
            max-width: 1000px !important;
            width: 100% !important;
            height: auto !important;
            display: block !important;
            margin: 0 auto 50px auto !important;
        }

        /* Subtitle Text Styling */
        .custom-text {
            font-size: 16px !important;
            line-height: 1.6 !important;
            font-weight: 400 !important;
            letter-spacing: -0.01em !important;
            max-width: 800px !important;
            margin: 0 auto 35px auto !important;
            display: block !important;
        }

        /* Contact Details Styling */
        .custom-contact {
            font-size: 15px !important;
            font-weight: 400 !important;
            margin: 0 auto 60px auto !important;
            display: block !important;
        }

        .custom-contact a {
            color: #262626 !important;
            text-decoration: none !important;
            display: inline-block !important;
        }

        .custom-contact a:hover {
            text-decoration: underline !important;
        }

        /* Footer Copyright Styling */
        .custom-footer {
            font-size: 13px !important;
            color: #8c8c8c !important;
            display: block !important;
            margin-top: auto !important;
            letter-spacing: 0.02em !important;
        }

        /* Force break unstyled environments */
        body > :not(.custom-wrapper) {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body>

    <div class="custom-wrapper">
        
        <img class="custom-logo" src="assets/goldenstateofmind.png" alt="golden state of mind"/>
        
        <div class="custom-text">
            Handcrafted Custom Framing &amp; Professional Art Installation
        </div>
        
        <div class="custom-contact">
            steve ruppel &nbsp;/&nbsp; <a href="mailto:sjruppel@gmail.com">sjruppel@gmail.com</a>
        </div>
        
        <div class="custom-footer">
            © sjruppel.com 2026
        </div>

    </div>

</body>
</html>
